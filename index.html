<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LanCache Domain Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --panel: #0a1520;
    --border: #1a3a5c;
    --accent: #00d4ff;
    --accent2: #00ff88;
    --warn: #ffaa00;
    --danger: #ff4466;
    --text: #c8e0f0;
    --dim: #4a6a8a;
    --glow: 0 0 20px rgba(0,212,255,0.3);
    --glow2: 0 0 20px rgba(0,255,136,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanline effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 1100px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    width: 52px;
    height: 52px;
    border: 2px solid var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--glow);
    animation: pulse-border 3s ease-in-out infinite;
  }

  .logo svg { width: 28px; height: 28px; }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 10px rgba(0,212,255,0.3); }
    50% { box-shadow: 0 0 30px rgba(0,212,255,0.7); }
  }

  .header-text h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(0,212,255,0.5);
  }

  .header-text p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--dim);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .status-badge {
    margin-left: auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    padding: 6px 14px;
    border-radius: 4px;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    letter-spacing: 2px;
    animation: blink 2s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Config Panel */
  .config-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .config-panel::before {
    content: 'CONFIG';
    position: absolute;
    top: 12px; right: 18px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 3px;
  }

  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 16px;
    align-items: end;
  }

  @media (max-width: 680px) {
    .config-grid { grid-template-columns: 1fr; }
  }

  .field-group label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .field-group input {
    width: 100%;
    background: rgba(0,212,255,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(0,212,255,0.2);
  }

  .btn-run {
    background: linear-gradient(135deg, #00d4ff22, #00ff8822);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 10px 28px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-run:hover {
    background: linear-gradient(135deg, #00d4ff44, #00ff8844);
    box-shadow: var(--glow);
    transform: translateY(-1px);
  }

  .btn-run:active { transform: translateY(0); }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Summary bar */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  @media (max-width: 600px) {
    .summary-bar { grid-template-columns: repeat(2, 1fr); }
  }

  .stat-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }

  .stat-box .num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 2rem;
    font-weight: bold;
    line-height: 1;
  }

  .stat-box .lbl {
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--dim);
    margin-top: 4px;
    text-transform: uppercase;
  }

  .stat-box.total .num { color: var(--accent); }
  .stat-box.ok .num { color: var(--accent2); }
  .stat-box.fail .num { color: var(--danger); }
  .stat-box.pending .num { color: var(--warn); }

  /* Platform sections */
  .platform-section {
    margin-bottom: 20px;
  }

  .platform-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px 8px 0 0;
    border-bottom: none;
    cursor: pointer;
    user-select: none;
  }

  .platform-icon { font-size: 1.2rem; }

  .platform-name {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .platform-stats {
    margin-left: auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--dim);
  }

  .platform-chevron {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--dim);
    transition: transform 0.2s;
  }

  .platform-section.collapsed .platform-chevron { transform: rotate(-90deg); }
  .platform-section.collapsed .domain-table { display: none; }

  .domain-table {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }

  .domain-row {
    display: grid;
    grid-template-columns: 1fr 120px 90px 80px;
    gap: 0;
    align-items: center;
    padding: 10px 18px;
    border-bottom: 1px solid rgba(26,58,92,0.5);
    transition: background 0.15s;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
  }

  .domain-row:last-child { border-bottom: none; }
  .domain-row:hover { background: rgba(0,212,255,0.04); }

  .domain-row.header-row {
    font-size: 0.62rem;
    letter-spacing: 2px;
    color: var(--dim);
    padding: 8px 18px;
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid var(--border);
  }

  .col-domain { color: var(--text); }
  .col-ip { color: var(--dim); }
  .col-status { text-align: center; }
  .col-ping { text-align: right; color: var(--dim); }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 3px;
    font-size: 0.65rem;
    letter-spacing: 2px;
    font-weight: 700;
  }

  .badge-ok { background: rgba(0,255,136,0.15); color: var(--accent2); border: 1px solid rgba(0,255,136,0.3); }
  .badge-fail { background: rgba(255,68,102,0.15); color: var(--danger); border: 1px solid rgba(255,68,102,0.3); }
  .badge-pending { background: rgba(255,170,0,0.1); color: var(--warn); border: 1px solid rgba(255,170,0,0.2); }
  .badge-checking {
    background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.2);
    animation: checking-pulse 1s ease-in-out infinite;
  }

  @keyframes checking-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Progress bar */
  .progress-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 28px;
    overflow: hidden;
    display: none;
  }

  .progress-wrap.active { display: block; }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.3s ease;
    box-shadow: 0 0 10px rgba(0,212,255,0.5);
  }

  /* Log panel */
  .log-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-top: 28px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    line-height: 1.8;
    max-height: 180px;
    overflow-y: auto;
    position: relative;
  }

  .log-panel::before {
    content: 'SYSTEM LOG';
    position: absolute;
    top: 10px; right: 14px;
    font-size: 0.55rem;
    color: var(--dim);
    letter-spacing: 3px;
  }

  .log-line { color: var(--dim); }
  .log-line.ok { color: var(--accent2); }
  .log-line.fail { color: var(--danger); }
  .log-line.info { color: var(--accent); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="10" height="10" rx="2" stroke="#00d4ff" stroke-width="1.5"/>
        <rect x="16" y="2" width="10" height="10" rx="2" stroke="#00d4ff" stroke-width="1.5"/>
        <rect x="2" y="16" width="10" height="10" rx="2" stroke="#00ff88" stroke-width="1.5"/>
        <rect x="16" y="16" width="10" height="10" rx="2" stroke="#00ff88" stroke-width="1.5"/>
        <line x1="12" y1="7" x2="16" y2="7" stroke="#00d4ff" stroke-width="1.5"/>
        <line x1="7" y1="12" x2="7" y2="16" stroke="#00d4ff" stroke-width="1.5"/>
        <line x1="21" y1="12" x2="21" y2="16" stroke="#00d4ff" stroke-width="1.5"/>
        <line x1="12" y1="21" x2="16" y2="21" stroke="#00ff88" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>LanCache Monitor</h1>
      <p>DOMAIN RESOLUTION CHECKER // CACHE HEALTH DIAGNOSTIC</p>
    </div>
    <div class="status-badge" id="liveStatus">● STANDBY</div>
  </header>

  <!-- Config -->
  <div class="config-panel">
    <div class="config-grid">
      <div class="field-group">
        <label>Cache Server IP</label>
        <input type="text" id="cacheIp" value="10.160.23.112" placeholder="e.g. 10.160.23.112">
      </div>
      <div class="field-group">
        <label>DNS / Hostname</label>
        <input type="text" id="cacheHostname" value="lancache.serverzone.com" placeholder="e.g. lancache.serverzone.com">
      </div>
      <button class="btn-run" id="runBtn" onclick="runCheck()">▶ RUN CHECK</button>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary-bar">
    <div class="stat-box total"><div class="num" id="sTot">0</div><div class="lbl">Total</div></div>
    <div class="stat-box ok"><div class="num" id="sOk">0</div><div class="lbl">Resolved</div></div>
    <div class="stat-box fail"><div class="num" id="sFail">0</div><div class="lbl">Failed</div></div>
    <div class="stat-box pending"><div class="num" id="sPend">0</div><div class="lbl">Pending</div></div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <!-- Domain Sections -->
  <div id="sectionsContainer"></div>

  <!-- Log -->
  <div class="log-panel" id="logPanel">
    <div class="log-line info">[SYS] LanCache Domain Checker initialized.</div>
    <div class="log-line">[SYS] Enter your cache server IP and click RUN CHECK to begin.</div>
  </div>

</div>

<script>
const PLATFORMS = [
  {
    name: "Steam", icon: "🎮", color: "#1b2838",
    domains: [
      "cs2.steamcontent.com",
      "steamcontent.com",

    ]

  {

      "blzddist3-a.akamaihd.net",

      "us.cdn.blizzard.com",
      "kr.cdn.blizzard.com"
    ]
  },
  {
    name: "Riot Games", icon: "⚔️", color: "#d13639",
    domains: [
      "l3cdn.riotgames.com",
      "na.l3cdn.riotgames.com",
      "eu.l3cdn.riotgames.com",
      "ap.l3cdn.riotgames.com",

    ]
  },
  {
    name: "EA / Origin", icon: "🟧", color: "#f56c2d",
    domains: [
      "origin-a.akamaihd.net",
      "lvlt.cdn.ea.com",
      "cdn-patch.swtor.com",
      "gp1.wac.edgecastcdn.net"
    ]
  },
  {
    name: "Ubisoft / Uplay", icon: "🔷", color: "#0c4fba",
    domains: [
      "cdn.ubi.com",
      "uplaypc-s-ubisoft.cdn.ubionline.com",
      "static3.cdn.ubi.com"
    ]
  },
  {
    name: "GOG", icon: "🌌", color: "#86328a",
    domains: [
      "cdn.gog.com",
      "images-4.gog.com",
      "gameplay.gog.com"
    ]
  },
  {
    name: "Windows Update", icon: "🪟", color: "#0078d4",
    domains: [
      "download.windowsupdate.com",
      "dl.delivery.mp.microsoft.com",
      "tlu.dl.delivery.mp.microsoft.com",
      "au.download.windowsupdate.com"
    ]
  },
  {
    name: "PlayStation", icon: "🎯", color: "#003791",
    domains: [
      "gs2.ww.prod.dl.playstation.net",
      "gs-sec.ww.np.dl.playstation.net",
      "ares.dl.playstation.net"
    ]
  },
  {
    name: "Xbox / Microsoft", icon: "🟩", color: "#107c10",
    domains: [
      "assets1.xboxlive.com",
      "assets2.xboxlive.com",
      "dlassets.xboxlive.com",
      "dlassets2.xboxlive.com"
    ]
  }
];

let results = {};
let totalDomains = 0;
let checked = 0;

function log(msg, type = '') {
  const panel = document.getElementById('logPanel');
  const ts = new Date().toLocaleTimeString('en-GB', { hour12: false });
  const div = document.createElement('div');
  div.className = 'log-line ' + type;
  div.textContent = `[${ts}] ${msg}`;
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
}

function updateSummary() {
  const vals = Object.values(results);
  const ok = vals.filter(r => r.status === 'ok').length;
  const fail = vals.filter(r => r.status === 'fail').length;
  const pend = vals.filter(r => r.status === 'checking' || r.status === 'pending').length;
  document.getElementById('sTot').textContent = totalDomains;
  document.getElementById('sOk').textContent = ok;
  document.getElementById('sFail').textContent = fail;
  document.getElementById('sPend').textContent = pend;
}

function updateProgress() {
  const pct = totalDomains > 0 ? (checked / totalDomains * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

function buildSections() {
  const container = document.getElementById('sectionsContainer');
  container.innerHTML = '';
  totalDomains = 0;

  PLATFORMS.forEach((plat, pi) => {
    totalDomains += plat.domains.length;

    const sec = document.createElement('div');
    sec.className = 'platform-section';
    sec.id = `sec-${pi}`;

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'platform-header';
    hdr.innerHTML = `
      <span class="platform-icon">${plat.icon}</span>
      <span class="platform-name">${plat.name}</span>
      <span class="platform-stats" id="pstats-${pi}">— / ${plat.domains.length}</span>
      <span class="platform-chevron">▾</span>
    `;
    hdr.onclick = () => sec.classList.toggle('collapsed');

    // Table
    const tbl = document.createElement('div');
    tbl.className = 'domain-table';
    tbl.innerHTML = `<div class="domain-row header-row">
      <div>DOMAIN</div><div>RESOLVED IP</div><div class="col-status">STATUS</div><div class="col-ping">LATENCY</div>
    </div>`;

    plat.domains.forEach((domain, di) => {
      const key = `${pi}-${di}`;
      results[key] = { domain, status: 'pending', ip: '—', ping: '—' };
      const row = document.createElement('div');
      row.className = 'domain-row';
      row.id = `row-${key}`;
      row.innerHTML = rowHTML(domain, '—', 'pending', '—');
      tbl.appendChild(row);
    });

    sec.appendChild(hdr);
    sec.appendChild(tbl);
    container.appendChild(sec);
  });

  document.getElementById('sTot').textContent = totalDomains;
}

function rowHTML(domain, ip, status, ping) {
  const badges = {
    ok: '<span class="badge badge-ok">CACHED</span>',
    fail: '<span class="badge badge-fail">MISS</span>',
    pending: '<span class="badge badge-pending">WAIT</span>',
    checking: '<span class="badge badge-checking">CHECK</span>'
  };
  return `
    <div class="col-domain">${domain}</div>
    <div class="col-ip">${ip}</div>
    <div class="col-status">${badges[status] || badges.pending}</div>
    <div class="col-ping">${ping !== '—' ? ping + ' ms' : '—'}</div>
  `;
}

function updateRow(pi, di, ip, status, ping) {
  const key = `${pi}-${di}`;
  results[key] = { status, ip, ping };
  const row = document.getElementById(`row-${key}`);
  if (row) row.innerHTML = rowHTML(PLATFORMS[pi].domains[di], ip, status, ping);

  // Update platform stats
  const platResults = PLATFORMS[pi].domains.map((_, di2) => results[`${pi}-${di2}`]);
  const okCount = platResults.filter(r => r && r.status === 'ok').length;
  const pstat = document.getElementById(`pstats-${pi}`);
  if (pstat) pstat.textContent = `${okCount} / ${PLATFORMS[pi].domains.length}`;

  updateSummary();
}

async function checkDomain(domain, cacheIp, pi, di) {
  const key = `${pi}-${di}`;
  // Mark as checking
  const row = document.getElementById(`row-${key}`);
  if (row) row.innerHTML = rowHTML(domain, '...', 'checking', '—');

  const start = performance.now();

  try {
    // Attempt to fetch the domain via HTTP — if LanCache intercepts, it'll respond
    const url = `http://${domain}/`;
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 5000);

    try {
      await fetch(url, {
        signal: controller.signal,
        mode: 'no-cors',
        cache: 'no-store'
      });
      clearTimeout(timeout);
      const ping = Math.round(performance.now() - start);
      updateRow(pi, di, cacheIp, 'ok', ping);
      log(`✓ ${domain} → resolved via cache (${ping}ms)`, 'ok');
    } catch (e) {
      clearTimeout(timeout);
      const ping = Math.round(performance.now() - start);
      // A network error in no-cors mode can still mean the server responded
      // (CORS block = server reachable). A real miss = timeout/DNS fail.
      if (e.name === 'AbortError') {
        updateRow(pi, di, 'TIMEOUT', 'fail', '>5000');
        log(`✗ ${domain} → timeout (>5s)`, 'fail');
      } else {
        // Got a response (CORS block) = cache likely intercepting
        const ping2 = Math.round(performance.now() - start);
        updateRow(pi, di, cacheIp, 'ok', ping2);
        log(`✓ ${domain} → responded (${ping2}ms)`, 'ok');
      }
    }
  } catch (err) {
    updateRow(pi, di, 'ERROR', 'fail', '—');
    log(`✗ ${domain} → error: ${err.message}`, 'fail');
  }

  checked++;
  updateProgress();
}

async function runCheck() {
  const cacheIp = document.getElementById('cacheIp').value.trim();
  const hostname = document.getElementById('cacheHostname').value.trim();

  if (!cacheIp) { log('ERROR: Cache IP is required.', 'fail'); return; }

  checked = 0;
  document.getElementById('runBtn').disabled = true;
  document.getElementById('liveStatus').textContent = '● SCANNING';
  document.getElementById('liveStatus').style.borderColor = 'var(--warn)';
  document.getElementById('liveStatus').style.color = 'var(--warn)';
  document.getElementById('progressWrap').classList.add('active');

  buildSections();
  updateSummary();

  log(`Starting domain check — Cache: ${cacheIp} (${hostname})`, 'info');
  log(`Checking ${totalDomains} domains across ${PLATFORMS.length} platforms...`, 'info');

  // Run checks with concurrency limit of 4
  const queue = [];
  PLATFORMS.forEach((plat, pi) => {
    plat.domains.forEach((domain, di) => {
      queue.push({ domain, pi, di });
    });
  });

  const CONCURRENCY = 4;
  let idx = 0;

  async function worker() {
    while (idx < queue.length) {
      const task = queue[idx++];
      await checkDomain(task.domain, cacheIp, task.pi, task.di);
    }
  }

  const workers = Array.from({ length: CONCURRENCY }, () => worker());
  await Promise.all(workers);

  // Done
  const okCount = Object.values(results).filter(r => r.status === 'ok').length;
  const failCount = Object.values(results).filter(r => r.status === 'fail').length;
  log(`Check complete: ${okCount} resolved, ${failCount} failed out of ${totalDomains} domains.`, 'info');

  document.getElementById('runBtn').disabled = false;
  document.getElementById('liveStatus').textContent = '● COMPLETE';
  document.getElementById('liveStatus').style.borderColor = 'var(--accent2)';
  document.getElementById('liveStatus').style.color = 'var(--accent2)';
  document.getElementById('progressBar').style.width = '100%';
}

// Init on load
buildSections();
updateSummary();
</script>
</body>
</html>
